name: Release

# Tag main as vX.Y.Z (matching the version in tauri.conf.json) and push the
# tag — this builds the NSIS installer, signs the updater artifacts with
# TAURI_SIGNING_PRIVATE_KEY (repo secret; key file lives at ~/.tauri/pulse.key
# on Thien's machine — losing it orphans every installed copy), and publishes
# a GitHub Release with latest.json for the in-app updater.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      # Actions pinned to full commit SHAs (not mutable tags): this job runs
      # with TAURI_SIGNING_PRIVATE_KEY in env, and a hijacked tag could
      # exfiltrate the updater key (losing it orphans every install). Trailing
      # comment = the human-readable version the SHA resolved to when pinned.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      # dtolnay/rust-toolchain reads the toolchain from its @ref, so a SHA pin
      # must name the toolchain explicitly (the SHA is not "stable").
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # 'stable' branch @ 2026-07-18
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Palette ${{ github.ref_name }}"
          releaseBody: "NSIS installer below. Unsigned — Windows SmartScreen will warn on first run (More info → Run anyway). Installed copies self-update from this release."
