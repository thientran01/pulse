name: CI

# Push/PR gate for main. Windows-only because Pulse is a Windows-only app
# (GSMTC / WASAPI / Win32) — its Rust tests won't even compile elsewhere.
# Mirrors release.yml's setup (checkout → node 22 + npm cache → rust stable →
# rust-cache on src-tauri) but runs the actual build + tests instead of the
# tauri-action release bundle.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only builds and tests — it never writes to the
# repo, releases, or any other resource, so the GITHUB_TOKEN needs read-only.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      # Actions pinned to full commit SHAs (not mutable tags) for supply-chain
      # safety; trailing comment = the version the SHA resolved to when pinned.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      # Frontend must build before the Rust side: tauri-build embeds the Vite
      # output (frontendDist = ../dist), so dist/ has to exist before cargo.
      - run: npm ci

      - run: npm run build

      # Frontend unit tests (vitest — the posClock kernel net).
      - run: npm test

      # dtolnay/rust-toolchain reads the toolchain from its @ref, so a SHA pin
      # must name the toolchain explicitly (the SHA is not "stable").
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # 'stable' branch @ 2026-07-18
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # Hard gates since 2026-07-15: the tree was formatted and the last
      # clippy warnings cleared in the Milestone D housekeeping pass.
      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
